  # ── Webhooks ────────────────────────────────────────────────────
  /api/webhooks/leads:
    post:
      tags: [Leads]
      summary: Create a lead via webhook
      description: External webhook endpoint for creating leads from integrations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company, contactName]
              properties:
                company:
                  type: string
                contactName:
                  type: string
                source:
                  type: string
                  example: "webhook_n8n"
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        "201":
          description: Lead created via webhook
